<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · FDE管理平台</title>
  <link rel="stylesheet" href="/css/style.css?v=6.0">
  <style>
    body {
      overflow: auto;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }
    .login-page {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }
    .login-card {
      background: #fff;
      border: 1px solid #e4e7ed;
      border-radius: 6px;
      padding: 2rem 1.85rem 1.65rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 1.65rem;
    }
    .login-brand .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto;
      border-radius: 6px;
      background: #1a5fb4;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      font-weight: 700;
      box-shadow: none;
    }
    .login-brand h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0.75rem 0 0.25rem;
      color: #1f2329;
      letter-spacing: 0.01em;
    }
    .login-brand p {
      color: #86909c;
      font-size: 0.85rem;
      margin: 0;
    }
    .login-form .form-group { margin-bottom: 1rem; }
    .login-form .form-group label {
      font-size: 0.8rem;
      color: #4e5969;
      margin-bottom: 0.35rem;
    }
    .login-form input {
      height: 40px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid #e4e7ed;
    }
    .login-form input:hover { border-color: #c9cdd4; }
    .login-form input:focus {
      border-color: #1a5fb4;
      box-shadow: 0 0 0 2px rgba(26, 95, 180, 0.12);
    }
    .login-submit {
      width: 100%;
      height: 40px;
      margin-top: 0.25rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
    }
    .login-submit:disabled { opacity: 0.7; cursor: wait; }
    .login-error {
      color: #dc2626;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #fef2f2;
      border-radius: 4px;
      border: 1px solid #fecaca;
      display: none;
    }
    @media (max-width: 480px) {
      .login-card { padding: 1.75rem 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="icon">F</div>
        <h1>FDE管理平台</h1>
        <p>任务流动与智能协作</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="empId">工号</label>
          <input id="empId" placeholder="请输入工号" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary login-submit" id="loginBtn">登 录</button>
      </form>

      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('agileai_token')) location.href = '/';

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '登录中…';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            emp_id: document.getElementById('empId').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');
        localStorage.setItem('agileai_token', data.token);
        localStorage.setItem('agileai_user', JSON.stringify(data.user));
        localStorage.setItem('agileai_role', JSON.stringify(data.roleConfig));
        location.href = '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    });
  </script>
</body>
</html>
