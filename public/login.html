<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · FDE管理平台</title>
  <link rel="stylesheet" href="/css/style.css?v=3.1">
  <style>
    body {
      overflow: auto;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8eef6;
      background-image:
        radial-gradient(ellipse 90% 70% at 10% 5%, rgba(45, 93, 168, 0.16), transparent),
        radial-gradient(ellipse 70% 55% at 90% 95%, rgba(245, 208, 97, 0.1), transparent),
        linear-gradient(165deg, #f0f4fa 0%, #e8eef6 45%, #dce8f5 100%);
    }
    .login-page {
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 20px;
      padding: 2.35rem 2rem 1.85rem;
      box-shadow: 0 24px 56px rgba(15, 23, 42, 0.1);
      backdrop-filter: blur(12px);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-brand .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto;
      border-radius: 16px;
      background: linear-gradient(135deg, #5ba4c9 0%, #2d5da8 48%, #1a3a6e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.65rem;
      box-shadow: 0 16px 32px rgba(45, 93, 168, 0.35), 0 8px 20px rgba(245, 208, 97, 0.15);
    }
    .login-brand h1 {
      font-size: 1.55rem;
      font-weight: 800;
      margin: 0.85rem 0 0.3rem;
      background: linear-gradient(135deg, #0f1a2e 0%, #2d5da8 55%, #f5d061 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }
    .login-brand p {
      color: #64748b;
      font-size: 0.88rem;
      margin: 0;
    }
    .login-form .form-group { margin-bottom: 1.1rem; }
    .login-form .form-group label {
      font-size: 0.8rem;
      color: #475569;
      margin-bottom: 0.4rem;
    }
    .login-form input {
      height: 44px;
      border-radius: 10px;
      background: #f8fbff;
      border: 1px solid #d8e4f2;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .login-form input:hover { background: #fff; border-color: #b8cce8; }
    .login-form input:focus {
      background: #fff;
      border-color: #2d5da8;
      box-shadow: 0 0 0 3px rgba(45, 93, 168, 0.15);
    }
    .login-submit {
      width: 100%;
      height: 44px;
      margin-top: 0.35rem;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }
    .login-submit:disabled { opacity: 0.7; cursor: wait; }
    .login-error {
      color: #dc2626;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #fef2f2;
      border-radius: 8px;
      border: 1px solid #fecaca;
      display: none;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.35rem 0 1rem;
      color: #94a3b8;
      font-size: 0.72rem;
    }
    .login-divider::before, .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .role-hints {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.55rem;
    }
    .role-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0.7rem 0.4rem;
      background: #f8fbff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.68rem;
      color: #64748b;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .role-hint:hover {
      border-color: #93b4f5;
      background: #fff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
      transform: translateY(-2px);
    }
    .role-hint:active { transform: translateY(0); }
    .role-hint .role-icon {
      font-size: 1.1rem;
      line-height: 1;
      margin-bottom: 0.35rem;
    }
    .role-hint strong {
      display: block;
      color: #153e75;
      font-size: 0.74rem;
      font-weight: 700;
      margin-bottom: 0.12rem;
    }
    .role-hint span { line-height: 1.3; }
    .llm-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid #eef2f8;
      font-size: 0.74rem;
      color: #94a3b8;
    }
    .llm-badge span { color: #2563eb; font-weight: 700; }
    .login-docs { display: flex; justify-content: center; gap: 1rem; margin-top: 0.75rem; font-size: 0.78rem; }
    .login-docs a { color: #2563eb; text-decoration: none; }
    .login-docs a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .login-card { padding: 1.75rem 1.25rem 1.5rem; }
      .role-hints { grid-template-columns: 1fr; }
      .role-hint { display: flex; align-items: center; gap: 0.65rem; text-align: left; padding: 0.65rem 0.85rem; }
      .role-hint .role-icon { margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="icon">⚡</div>
        <h1>FDE管理平台</h1>
        <p>任务流动与智能协作</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="empId">工号</label>
          <input id="empId" placeholder="请输入工号" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary login-submit" id="loginBtn">登 录</button>
      </form>

      <div class="login-error" id="loginError"></div>

      <div class="login-docs">
        <a href="/FDE模型API接入技术方案.html" target="_blank">📡 API 接入</a>
        <a href="/FDE先进智能模型框架.html" target="_blank">🧠 模型框架</a>
        <a href="/FDE管理平台布局优化方案.html" target="_blank">📐 布局方案</a>
        <a href="/FDE管理平台开发方案.html" target="_blank">📘 开发文档</a>
      </div>

      <div class="llm-badge">
        <span>🤖</span>
        智能引擎：<span id="llmStatus">检测中...</span>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('agileai_token')) location.href = '/';

    function fillLogin(id, pw) {
      document.getElementById('empId').value = id;
      document.getElementById('password').value = pw;
      document.getElementById('empId').focus();
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '登录中…';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            emp_id: document.getElementById('empId').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');
        localStorage.setItem('agileai_token', data.token);
        localStorage.setItem('agileai_user', JSON.stringify(data.user));
        localStorage.setItem('agileai_role', JSON.stringify(data.roleConfig));
        location.href = '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    });

    fetch('/api/ai/status')
      .then(r => r.json())
      .then(s => {
        const el = document.getElementById('llmStatus');
        el.textContent = s.llm ? `${s.llm.provider} · ${s.llm.model}` : '规则模式 + LLM 可选增强';
      })
      .catch(() => {
        document.getElementById('llmStatus').textContent = '规则模式 + LLM 可选增强';
      });
  </script>
</body>
</html>
