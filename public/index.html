<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgileAI · AI赋能敏捷项目管理平台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">AgileAI</span>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">📊 仪表盘</button>
        <button class="nav-item" data-view="kanban">📋 流动看板</button>
        <button class="nav-item" data-view="backlog">📝 Backlog</button>
        <button class="nav-item" data-view="sprint">🏃 Sprint</button>
        <button class="nav-item" data-view="acceptance">✅ 验收中心</button>
        <button class="nav-item" data-view="ai">🤖 AI 助手</button>
      </nav>
      <div class="sidebar-footer">
        <div class="sprint-badge" id="activeSprintBadge">加载中...</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 id="pageTitle">仪表盘</h1>
        <div class="topbar-actions">
          <button class="btn btn-ghost" id="btnStandup">📋 站会摘要</button>
          <button class="btn btn-ghost" id="btnRisks">⚠️ 风险扫描</button>
          <button class="btn btn-primary" id="btnNewItem">+ 新建</button>
        </div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">标题</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
</body>
</html>
