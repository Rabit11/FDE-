<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FDE管理平台</title>
  <link rel="stylesheet" href="/css/style.css?v=3.6">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">FDE管理平台</span>
      </div>
      <div class="user-card" id="userCard">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">加载中</div>
          <div class="user-role" id="userRole"></div>
        </div>
      </div>
      <nav class="nav" id="navMenu"></nav>
      <div class="sidebar-footer">
        <div class="workflow-badge" id="workflowBadge" style="cursor:pointer;font-size:0.75rem;color:var(--muted);padding:0.5rem;text-align:center" title="点击查看" onclick="goWorkflowBadge()">加载中...</div>
        <div class="sidebar-doc-links">
          <a href="/FDE配色方案预览.html" target="_blank">配色方案</a>
          <a href="/FDE模型API接入技术方案.html" target="_blank">API 接入</a>
          <a href="/FDE先进智能模型框架.html" target="_blank">模型框架</a>
          <a href="/FDE管理平台布局优化方案.html" target="_blank">布局方案</a>
          <a href="/FDE管理平台开发方案.html" target="_blank">开发文档</a>
        </div>
        <button class="btn btn-ghost btn-sm" id="btnLogout" style="width:100%;margin-top:0.5rem">退出登录</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 id="pageTitle">工作台</h1>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">标题</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js?v=3.9"></script>
</body>
</html>
